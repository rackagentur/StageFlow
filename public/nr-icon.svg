<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" role="img" aria-label="NoxReach">
  <title>NoxReach</title>
  <defs>

    <!-- Background: deep purple radial gradient -->
    <radialGradient id="bg" cx="52%" cy="34%" r="62%">
      <stop offset="0%"   stop-color="#2E0A52"/>
      <stop offset="55%"  stop-color="#18022E"/>
      <stop offset="100%" stop-color="#0A0016"/>
    </radialGradient>

    <!--
      N gradient: purple bottom-left → cyan top-right.
      Gradient spans the exact bounding box of the N so the top
      of the N matches the R's cyan seamlessly at their shared border.
    -->
    <linearGradient id="ng" x1="90" y1="800" x2="510" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6428CC"/>
      <stop offset="42%"  stop-color="#2478FF"/>
      <stop offset="100%" stop-color="#00C8FF"/>
    </linearGradient>

    <!--
      ECG mask — white = show, black = cut.
      Using a mask instead of a coloured stroke so the background
      gradient shows through perfectly regardless of position.
      The flat line runs from x=90 (left edge of N) to x=910 (right
      edge of R), fully spanning both letters.
      The heartbeat spike sits in the R bowl area.
    -->
    <mask id="ecg">
      <rect width="1000" height="1000" fill="white"/>
      <path
        d="M 90,500
           L 520,500
           L 548,452
           L 580,550
           L 616,388
           L 648,614
           L 678,500
           L 910,500"
        stroke="black"
        stroke-width="34"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>
    </mask>

  </defs>

  <!-- Rounded square background -->
  <rect width="1000" height="1000" rx="118" fill="url(#bg)"/>

  <!-- ── NR monogram — masked by ECG cutout ── -->
  <g mask="url(#ecg)">

    <!--
      N — single self-intersecting polygon.

      SVG nonzero winding rule (the default) renders this correctly:
      · The two counter-spaces (upper-right triangle and lower-left
        triangle) have winding number 0  → transparent background shows
      · Both vertical strokes and the cross-diagonal have winding ≠ 0 → filled

      Vertices (clockwise from bottom-left):
        outer-BL → outer-TL → top-right-of-left-stroke
        → [outer diagonal down-right] →
        bottom-left-of-right-stroke → outer-BR → outer-TR
        → top-left-of-right-stroke
        → [inner diagonal down-left] →
        bottom-right-of-left-stroke → close

      Left stroke  : x  90 – 245  (155 px wide)
      Right stroke : x 365 – 510  (145 px wide)
      Height       : y 200 – 800  (600 px)
      N shares its right edge (x=510) with the R's left edge.
    -->
    <polygon
      points="90,800  90,200  245,200  365,800
              510,800  510,200  365,200  245,800"
      fill="url(#ng)"
    />

    <!--
      R — three overlapping solid cyan shapes.
      Slight overlaps (≈20 px) at every junction so no sub-pixel gap
      can appear between the pieces.

      Left bar : x 510 – 648, full height 200–800
      Bowl     : D-curve from (628,200) to (628,500), peaking ~x 876
      Leg      : parallelogram from bowl-bottom to lower-right
    -->

    <!-- R: left bar -->
    <rect x="510" y="200" width="138" height="600" fill="#00C8FF"/>

    <!-- R: bowl (single symmetric cubic bezier) -->
    <!--
      M (left,top)  C (far-right,top) (far-right,bottom) (left,bottom)  Z
      The closing Z draws the straight left edge of the D automatically.
      Peak at t=0.5 ≈ (0.25×628 + 0.75×960, 350) ≈ (877, 350)
    -->
    <path d="M 628,200 C 960,200 960,500 628,500 Z" fill="#00C8FF"/>

    <!-- R: leg -->
    <polygon points="628,500 762,500 908,800 778,800" fill="#00C8FF"/>

  </g>

</svg>
