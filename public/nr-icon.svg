<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" role="img" aria-label="NoxReach">
  <title>NoxReach</title>
  <defs>
    <!-- Dark purple background gradient -->
    <radialGradient id="bgGrad" cx="55%" cy="32%" r="68%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2C0858"/>
      <stop offset="100%" stop-color="#0F0018"/>
    </radialGradient>

    <!-- N letter gradient: purple (bottom-left) → cyan (top-right) -->
    <linearGradient id="nGrad" x1="100" y1="790" x2="530" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7040DF"/>
      <stop offset="48%"  stop-color="#2B8EFF"/>
      <stop offset="100%" stop-color="#00CCFF"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="1000" height="1000" rx="120" fill="url(#bgGrad)"/>

  <!--
    N letter — single polygon tracing the full letter silhouette.
    Left stroke: x 100–225  |  Right stroke: x 390–510
    Height: y 220–790       |  Cross-diagonal connects them.

    Going clockwise from bottom-left:
      outer-left-bottom → outer-left-top → top-of-left-stroke →
      diagonal-down-right → bottom-of-right-stroke → outer-right-bottom →
      outer-right-top → top-of-right-stroke → inner-diagonal-back → bottom-of-left-stroke
  -->
  <polygon
    points="100,790 100,220 225,220 390,790 510,790 510,220 390,220 225,790"
    fill="url(#nGrad)"
  />

  <!--
    R letter — three overlapping filled shapes, all solid cyan.
    Left bar: x 510–630, full height.
    Bowl: cubic-bezier D-shape from y=220 to y=505, peaking ~x=875.
    Leg: parallelogram from bowl-bottom diagonally to lower-right.
  -->

  <!-- R: vertical bar -->
  <rect x="510" y="220" width="118" height="570" fill="#00CCFF"/>

  <!-- R: bowl (filled D-shape) -->
  <path
    d="M 628,220
       C 628,220 882,220 882,363
       C 882,505 628,505 628,505
       Z"
    fill="#00CCFF"
  />

  <!-- R: leg -->
  <polygon
    points="628,505 748,505 900,790 775,790"
    fill="#00CCFF"
  />

  <!--
    ECG / heartbeat waveform — drawn in the background dark color
    so it appears as a "cut" through both letters at mid-height (y≈505).
    Spike sits inside the R bowl area.
  -->
  <path
    d="M 100,502
       L 540,502
       L 564,445
       L 594,568
       L 628,400
       L 662,612
       L 696,502
       L 900,502"
    stroke="#0F0018"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
