<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" role="img" aria-label="NoxReach">
  <title>NoxReach</title>
  <defs>

    <!-- Background: deep purple radial -->
    <radialGradient id="bg" cx="52%" cy="34%" r="62%">
      <stop offset="0%"   stop-color="#2E0A52"/>
      <stop offset="55%"  stop-color="#18022E"/>
      <stop offset="100%" stop-color="#0A0016"/>
    </radialGradient>

    <!-- N gradient: purple bottom-left → cyan top-right -->
    <!-- spans the full NR width so the top of N matches the R colour -->
    <linearGradient id="ng" x1="95" y1="800" x2="510" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6B32DC"/>
      <stop offset="42%"  stop-color="#2480FF"/>
      <stop offset="100%" stop-color="#00C8FF"/>
    </linearGradient>

    <!--
      ECG mask — white = show letter, black = hide (reveals background).
      This is cleaner than a coloured stroke because the background
      gradient shows through perfectly at every position.
    -->
    <mask id="ecg">
      <rect width="1000" height="1000" fill="white"/>
      <path
        d="M 95,498
           L 535,498
           L 562,448
           L 594,552
           L 630,385
           L 660,615
           L 690,498
           L 905,498"
        stroke="black" stroke-width="32"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none"/>
    </mask>

  </defs>

  <!-- Background rounded square -->
  <rect width="1000" height="1000" rx="118" fill="url(#bg)"/>

  <!-- ── NR monogram, ECG mask cuts through both letters ── -->
  <g mask="url(#ecg)">

    <!--
      N letter built from 3 non-overlapping solid fills:
        • left stroke  (vertical bar, x 95–215)
        • diagonal     (parallelogram from top-right of left stroke
                        to bottom-left of right stroke)
        • right stroke (vertical bar, x 380–500)
      All three share the same gradient so they look like one shape.
    -->

    <!-- N: left vertical bar -->
    <rect x="95" y="200" width="120" height="600" fill="url(#ng)"/>

    <!-- N: cross diagonal (parallelogram) -->
    <!-- top edge: (215,200)→(335,200)  bottom edge: (380,800)→(260,800) -->
    <polygon
      points="215,200 335,200 380,800 260,800"
      fill="url(#ng)"/>

    <!-- N: right vertical bar -->
    <rect x="380" y="200" width="120" height="600" fill="url(#ng)"/>

    <!-- R: left vertical bar -->
    <rect x="500" y="200" width="128" height="600" fill="#00C8FF"/>

    <!--
      R: bowl — single symmetric cubic bezier D-shape.
      M (left,top) C (far-right,top) (far-right,bottom) (left,bottom) Z
      Peaks at roughly x≈870 at mid-height.
    -->
    <path
      d="M 608,200 C 950,200 950,500 608,500 Z"
      fill="#00C8FF"/>

    <!--
      R: leg — diagonal parallelogram from bowl-bottom to lower-right.
    -->
    <polygon
      points="608,500 740,500 905,800 775,800"
      fill="#00C8FF"/>

  </g>

</svg>
